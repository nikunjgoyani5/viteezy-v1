<div *ngIf="isLoading" class="example-loading-shade">
  <mat-spinner></mat-spinner>
</div>

<div *ngIf="filterEnabled" style="width: 180px">
  <mat-form-field>
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" #input />
  </mat-form-field>
</div>

<div class="table-div mat-elevation-z8">
  <table
    mat-table
    [dataSource]="dataSource"
    class="table"
    matSort
    [matSortDisableClear]="true"
    (matSortChange)="onSortChanged($event)"
  >
    <!-- Properties -->
    <ng-container
      *ngFor="let column of properties"
      matColumnDef="{{ column.propertyName }}"
    >
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        {{ column.displayName || column.propertyName }}
        <mat-icon *ngIf="column.toolTip" class="tooltip" matTooltip="{{ column.toolTip }}">info_outline</mat-icon>
      </th>
      <td mat-cell *matCellDef="let row; let i = index">
        <!-- Display value -->
        <span *ngIf="column.htmlType === 'text'">{{ row.properties[column.propertyName].value }}</span>
        <a *ngIf="column.htmlType === 'link'" target="_blank" href="{{ row.properties[column.propertyName].value }}">{{ row.properties[column.propertyName].value }}</a>

        <!-- Property actions -->
        <app-action-buttons
          *ngIf="row.properties[column.propertyName].actions"
          class="actionbuttons"
          [rowActions]="row.properties[column.propertyName].actions"
          [entity]="row.entity"
          (selectedAction)="onAction(row.entity, i, $event)"
        ></app-action-buttons>
      </td>
    </ng-container>

    <!-- Action buttons -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row; let i = index">
        <app-action-buttons
          class="actionbuttons"
          [menuActions]="menuActions"
          [rowActions]="rowActions"
          [entity]="row.entity"
          (selectedAction)="onAction(row.entity, i, $event)"
        ></app-action-buttons>
      </td>
    </ng-container>

    <ng-container *ngIf="showHeader">
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    </ng-container>
    <tr
      mat-row
      *matRowDef="let row; let i = index; columns: displayedColumns"
      (click)="onRowClick(row.entity, i)"
      [ngClass]="{ 'row-hover': hoverEnabled, 'active': selectedRow === i  }"
      
    ></tr>
  </table>
  <mat-paginator
    *ngIf="showPaginator"
    (page)="onPageChange($event)"
    [length]="entities?.length"
    [pageSizeOptions]="pageSizeOptions"
    [pageSize]="pageSize"
  >
  </mat-paginator>
</div>
