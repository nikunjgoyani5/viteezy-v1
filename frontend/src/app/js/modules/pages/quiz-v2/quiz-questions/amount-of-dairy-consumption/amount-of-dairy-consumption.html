<section>
  <div class="wrapper wrapper-quiz-v2">
    <div class="question-header">
      <h1>Hoeveel zuivelproducten nuttig je gemiddeld per dag?</h1>
      <h2>Bijvoorbeeld een glas melk, stuk kaas of bakje yoghurt</h2>
    </div>

    <div class="quiz-button quiz-button--icon" ng-repeat="answer in vm.questionAnswers">
      <input type="radio" id="answer-{{answer.code}}" name="amount-of-dairy-consumption" value="{{answer.id}}" ng-model="vm.questionConfig.answerId" ng-click="vm.submitQuestionAnswer(answer.id)">
      <label for="answer-{{answer.code}}">
        <i class="icon icon-dairy-{{answer.code}}"></i>
        {{answer.name}}
        <span ng-if="answer.subtitle">{{answer.subtitle}}</span>
      </label>
    </div>
  </div>
</section>
<vi-progress current="vm.questionConfig.currentProgress" total="100"></vi-progress>
