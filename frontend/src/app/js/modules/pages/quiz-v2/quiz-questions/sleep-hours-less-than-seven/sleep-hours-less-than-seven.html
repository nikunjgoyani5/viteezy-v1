<section>
  <div class="wrapper wrapper-quiz-v2">
    <div class="question-header">
      <i class="icon icon-weight-loose"></i>
      <h1>Slaap je gemiddeld minder dan zeven uur per dag?</h1>
      <h2>Bij onvoldoende slaap neemt de behoefte aan snelle suikers toe</h2>
    </div>

    <div class="quiz-button-wrapper">
      <div class="quiz-button" ng-repeat="answer in vm.questionAnswers">
        <input type="radio" id="answer-{{answer.code}}" name="sleep-hours-less-than-seven" value="{{answer.id}}" ng-model="vm.questionConfig.answerId" ng-click="vm.submitQuestionAnswer(answer.id)">
        <label for="answer-{{answer.code}}">
          {{answer.name}}
          <span ng-if="answer.subtitle">{{answer.subtitle}}</span>
        </label>
      </div>
    </div>
  </div>
</section>
<vi-progress current="vm.questionConfig.currentProgress" total="100"></vi-progress>
