<section>
  <div class="wrapper wrapper-quiz-v2">
    <div class="question-header">
      <i class="icon icon-libido"></i>
      <h1>In hoeverre ervaar je veel druk in het dagelijks leven?</h1>
      <h2>de mate van drukte kan invloed hebben op je libido</h2>
    </div>

    <div class="quiz-button" ng-repeat="answer in vm.questionAnswers">
      <input type="radio" id="answer-{{answer.code}}" name="libido-stress-level" value="{{answer.id}}" ng-model="vm.questionConfig.answerId" ng-click="vm.submitQuestionAnswer(answer.id)">
      <label for="answer-{{answer.code}}">
        {{answer.name}}
        <span ng-if="answer.subtitle">{{answer.subtitle}}</span>
      </label>
    </div>
  </div>
</section>
<vi-progress current="vm.questionConfig.currentProgress" total="100"></vi-progress>
