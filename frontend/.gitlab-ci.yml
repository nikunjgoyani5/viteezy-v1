cache:
  paths:
  - .npm/ # Cache downloaded node.js dependencies between builds.

stages:
  - build
  - distribute:docker
  - deploy

build:
  image: node:18
  stage: build
  script:
    - npm ci --cache .npm
    - npm link @angular/cli
    - ng build --configuration production --aot --build-optimizer
  artifacts:
    paths:
    - dist/

distribute:docker:
  image: google/cloud-sdk:525.0.0-debian_component_based
  services:
    - docker:19.03.13-dind
#   - docker:dind    <--- docker:dind does not work well
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  stage: distribute:docker
  before_script:
    - gcloud auth activate-service-account --key-file=${GCLOUD_SERVICE_KEY}
    - gcloud --quiet config set project ${GOOGLE_PROJECT_ID}
    - gcloud --quiet config set compute/region ${GOOGLE_COMPUTE_REGION}
    - gcloud --quiet config set compute/zone ${GOOGLE_COMPUTE_ZONE}
    - gcloud --quiet auth configure-docker europe-docker.pkg.dev
  script:
    - docker build -t europe-docker.pkg.dev/viteezy/frontend/docker:${CI_COMMIT_SHORT_SHA} .
    - docker push europe-docker.pkg.dev/viteezy/frontend/docker:${CI_COMMIT_SHORT_SHA}
  dependencies:
    - build
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\/.*/'
    - if: '$CI_COMMIT_BRANCH =~ /^hotfix\/.*/'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - when: never

deploy:staging:
  stage: deploy
  variables:
    k8s_deployment_key: deployment/frontend
    k8s_deployment_value: frontend
    IMAGE_FULL_QUALIFIED: europe-docker.pkg.dev/viteezy/frontend/docker:${CI_COMMIT_SHORT_SHA}
    SERVICE_DOCKER_IMAGE_NAME: frontend
    SERVICE_DOCKER_IMAGE_VERSION: ${CI_COMMIT_SHORT_SHA}
  trigger:
    project: viteezy/iac
    branch: master
  when: on_success
  only:
    - master
