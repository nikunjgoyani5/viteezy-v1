            - name: NEWSLETTER_LIST_ID
              value: VTHQX8
            - name: EXISTING_CUSTOMER_LIST_ID
              value: U9yLUt
          startupProbe:
            httpGet:
              path: /health-check?type=alive
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 1
            periodSeconds: 5
            failureThreshold: 30
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health-check?type=alive
              port: 8080
              scheme: HTTP
            timeoutSeconds: 1
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health-check
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 1
          resources:
            requests:
              memory: 768Mi
              cpu: 100m
            limits:
              memory: 1500Mi
              cpu: 1
          volumeMounts:
            - name: viteezy-staging-secret-volume
              readOnly: true
              mountPath: "/etc/viteezy-staging-secret-volume"
      volumes:
      - name: viteezy-staging-secret-volume
        secret:
          secretName: viteezy-staging-secrets
