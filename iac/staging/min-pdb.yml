apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-min-pdb
  namespace: viteezy-staging
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-min-pdb
  namespace: viteezy-staging
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend