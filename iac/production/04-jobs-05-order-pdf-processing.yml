apiVersion: batch/v1
kind: CronJob
metadata:
  name: order-pdf-processing
  namespace: viteezy-production
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      completions: 1
      ttlSecondsAfterFinished: 60
      template:
        spec:
          containers:
            - name: docker-order-pdf-processing
              image: europe-docker.pkg.dev/viteezy/order-pdf-processing/docker@sha256:1d10a6848e4856ba789f748388da2a7d39a538d7ecd8fa5a2de36d4c85d9cac6
              command:
                - /bin/sh
                - -c
                - vop process run --all
              env:
                - name: DATABASE_HOST
                  value: db-backend-service
                - name: DATABASE_USERNAME
                  value: viteezyUser
                - name: DATABASE_PASSWORD
                  value: FIND-realize-whether-PART-stood
                - name: SFTP_HOST
                  value: sftp-gateway-transfer.p16.cldsvc.net
                - name: SFTP_USERNAME
                  value: sftpviteezyp
                - name: SFTP_PRIVATE_KEY
                  value: /etc/viteezy-production-secret-volume/private_key_viteezy_prod.pem
                - name: STRAPI_HOST
                  value: https://cms.viteezy.com
                - name: STRAPI_ACCESS_TOKEN
                  value: b3c911cd83f5b3f381357bea4584633eedda6b9ff6b92804819298d20ab8a9dc13409aaf1c06b9a766bebeeb399eebf0e14f08c40f5b68b513c13bf8e2e52aae6025096598666bf71042ead8341011a30facb120c00608d8c228f1956e8e0cee13e45707bd5d744c5de1e6f309d3e2f55da8f22f398bb5dc4f503702bbf13c96
              volumeMounts:
                - name: viteezy-production-secret-volume
                  readOnly: true
                  mountPath: "/etc/viteezy-production-secret-volume"
          volumes:
          - name: viteezy-production-secret-volume
            secret:
              secretName: viteezy-production-secrets
          restartPolicy: Never